<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box-Sizing Comparison</title>
  <link rel="stylesheet" href="Page.css">
</head>
<body>
  <main class="container">
    <section class="box default-box">
      <h2>Default (content-box)</h2>
      <p>Padding adds to the total width and height.</p>
    </section>

    <section class="box border-box">
      <h2>Border-Box</h2>
      <p>Padding is included inside the total width and height.</p>
    </section>
  </main>
</body>
</html>
