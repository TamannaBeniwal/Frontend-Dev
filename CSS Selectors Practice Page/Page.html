<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Selectors Practice</title>
  <link rel="stylesheet" href="Page.css">
</head>
<body>
  <header><h1>CSS Selectors Practice Page</h1></header>

  <main>
    <p class="info">This is a paragraph with a class selector.</p>
    <p id="unique">This paragraph uses an ID selector.</p>
    <a href="#" title="Example Link">Hover over this link</a>
    <ul>
      <li>Item One</li>
      <li>Item Two</li>
      <li>Item Three</li>
    </ul>
    <div>
      <p>This paragraph is a descendant of a div.</p>
      <p>So it’s styled with the descendant selector.</p>
    </div>
  </main>

  <footer><p>Selectors Demo Footer</p></footer>
</body>
</html>
