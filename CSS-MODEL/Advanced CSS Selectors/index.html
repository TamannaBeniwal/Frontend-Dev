<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced CSS Selectors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>Advanced CSS Selectors Demo</h1></header>

  <main>
    <section>
      <ul class="item-list">
        <li><a href="https://example.com">HTTPS Link</a></li>
        <li><a href="http://example.org">HTTP Link</a></li>
        <li><input type="text" placeholder="Text Input"></li>
        <li><input type="email" placeholder="Email Input"></li>
        <li class="note">This is a note item.</li>
      </ul>
    </section>
  </main>

  <footer><p>Selectors: attributes, pseudo-classes, pseudo-elements, combinators.</p></footer>
</body>
</html>
