<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borders and Padding Demonstration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Borders and Padding Demonstration</h1>
    <p>Explore different border styles, rounded corners, and padding effects.</p>
  </header>

  <main>
    <section class="box-container">
      <div class="box solid">Solid Border</div>
      <div class="box dashed">Dashed Border</div>
      <div class="box double">Double Border</div>
      <div class="box groove">Groove Border</div>
    </section>
  </main>

  <footer>
    <p>Created for CSS practice &mdash; Borders, Padding, and Flexbox.</p>
  </footer>
</body>
</html>
