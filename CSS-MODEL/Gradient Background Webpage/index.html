<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradient Backgrounds</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>CSS Gradient Backgrounds</h1>
  </header>

  <main>
    <section class="linear">
      <h2>Linear Gradient Section</h2>
      <p>This section uses a <strong>linear gradient</strong> background transitioning from blue to purple.</p>
    </section>

    <section class="radial">
      <h2>Radial Gradient Section</h2>
      <p>This section uses a <strong>radial gradient</strong> with a fixed background for a parallax-like effect.</p>
    </section>
  </main>

  <footer>
    <p>Created for CSS gradient demonstration.</p>
  </footer>
</body>
</html>
