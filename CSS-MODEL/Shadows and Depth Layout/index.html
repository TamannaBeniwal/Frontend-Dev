<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadows and Depth Effects</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header><h1>Shadows and Depth Effects</h1></header>

  <main class="card-container">
    <article class="card shadow-light">
      <h2>Soft Shadow</h2>
      <p>A gentle shadow effect for subtle depth.</p>
    </article>

    <article class="card shadow-medium">
      <h2>Medium Shadow</h2>
      <p>Creates a balanced elevation feel.</p>
    </article>

    <article class="card shadow-strong">
      <h2>Strong Shadow</h2>
      <p>Simulates a lifted or floating card.</p>
    </article>
  </main>

  <footer><p>CSS box-shadow and text-shadow practice.</p></footer>

</html>
