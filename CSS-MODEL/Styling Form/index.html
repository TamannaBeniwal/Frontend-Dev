<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outline and Focus Styling Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header><h1>Outline and Focus Styling Form</h1></header>

  <main>
    <form class="styled-form">
      <label>Name</label>
      <input type="text" placeholder="Enter your name">
      <label>Message</label>
      <textarea rows="4" placeholder="Write something..."></textarea>
      <button type="submit">Submit</button>
    </form>
  </main>

  <footer><p>Focus states and outline demonstrations.</p></footer>
</body>
</html>
