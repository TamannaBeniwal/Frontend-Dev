<!DOCTYPE html>
<html lang="en">

  <link rel="stylesheet" href="Cards.css">
</head>
<body>

    <article class="card">

    <article class="card">
      <img src="profile3.jpg" alt="Profile 3">

      <p>UI/UX Specialist</p>
    </article>
  </main>
</body>
</html>
