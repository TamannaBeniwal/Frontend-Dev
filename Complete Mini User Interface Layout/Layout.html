<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini UI Layout</title>
  <link rel="stylesheet" href="Layout.css">
</head>
<body>
  <header class="header">
    <h1>Mini User Interface</h1>
  </header>

  <main class="content">
    <section class="card">
      <img src="sample.jpg" alt="Sample" class="card-img">

      <form class="form">
        <input type="text" placeholder="Enter your name">
        <input type="email" placeholder="Enter your email">
        <button class="btn">Submit</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>2025 Mini UI Demo</p>
  </footer>
</body>
</html>
