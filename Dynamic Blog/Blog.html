<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Blog Posts</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .post {
            padding: 12px;
            margin: 10px 0;
            background: #f4f4f4;
            border-radius: 6px;
        }

        .highlight {
            background: yellow !important;
        }

        .tag {
            background: #d1ecf1;
            color: #0c5460;
            padding: 4px 8px;
            margin-right: 5px;
            border-radius: 5px;
            font-size: 12px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <h2>Blog Post Manager</h2>

    <button id="addPost">Add New Post</button>
    <button id="prependPost">Prepend Featured Post</button>
    <button id="removeLast">Remove Last Post</button>

    <br><br>

    <label>Keyword to Highlight:</label>
    <input type="text" id="keyword" placeholder="Type keyword...">

    <button id="applyHighlight">Highlight Keyword</button>

    <div id="postList">

        <div class="post">JavaScript Tips and Tricks</div>
        <div class="post">Understanding CSS Flexbox</div>
        <div class="post">Introduction to Python Programming</div>
        <div class="post">React Hooks Explained</div>
        <div class="post">Mastering Data Structures</div>

    </div>

    <script src="q8.js"></script>
</body>
</html>
