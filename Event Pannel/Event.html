<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Subscription Panel</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="subscription.js" defer></script>

    <style>
        body { font-family: Arial; margin: 25px; }

        .topic {
            padding: 10px;
            background: #f2f2f2;
            border-radius: 5px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .selected {
            background-color: #c7f7c7;
        }

        #message {
            margin-top: 15px;
            padding: 10px;
            display: none;
            background: #d8ffd8;
            border-left: 4px solid green;
        }
    </style>
</head>

<body>

<header>
    <h1>Event Subscription Panel</h1>
</header>

<main>

    <button id="subscribe">Subscribe</button>
    <button id="unsubscribe">Unsubscribe</button>

    <h3>Topics</h3>

    <div id="topicList">
        <div class="topic">Technology</div>
        <div class="topic">Sports</div>
        <div class="topic">Health</div>
    </div>

    <br>

    <button id="addTopicBtn">Add New Topic</button>

    <div id="message"></div>

</main>

</body>
</html>
