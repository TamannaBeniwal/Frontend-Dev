<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Registration Form</title>
</head>
<body>
<h1>Course Registration</h1>

<form>
  <fieldset>
    <legend>Student Information</legend>
    <label>Name: <input type="text" name="name"></label><br><br>
    <label>Email: <input type="email" name="email"></label><br><br>
    <label>Select Course:
      <select name="course">
        <option>Web Development</option>
        <option>Data Science</option>
        <option>AI & ML</option>
      </select>
    </label>
  </fieldset>

  <h2>Course Schedule</h2>
  <table border="1" cellpadding="10">
    <tr><th>Day</th><th>Time</th><th>Instructor</th></tr>
    <tr><td>Tuesday</td><td>10:00 AM</td><td>Mr. Amol</td></tr>
    <tr><td>Wednesday</td><td>2:00 PM</td><td>Mr.Akash</td></tr>
    <tr><td>Thursday</td><td>11:00 AM</td><td>Mr.Amol</td></tr>
  </table>
</form>
</body>
</html>
