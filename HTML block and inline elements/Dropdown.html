<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dropdown Selection</title>
</head>
<body>
<h1>Travel Selection</h1>

<label>Country:
  <select>
    <option selected>India</option>
    <option>USA</option>
    <option>France</option>
  </select>
</label><br><br>

<label>State:
  <select>
    <option selected>Maharashtra</option>
    <option>California</option>
    <option>Île-de-France</option>
  </select>
</label><br><br>

<label>City:
  <select>
    <option selected>Mumbai</option>
    <option>Los Angeles</option>
    <option>Paris</option>
  </select>
</label><br><br>

<label>Favorite Tourist Place:
  <select>
    <option selected>Gateway of India</option>
    <option>Hollywood</option>
    <option>Eiffel Tower</option>
  </select>
</label>

<p>You have selected <strong>India</strong> → <strong>Maharashtra</strong> → <strong>Mumbai</strong> and your favorite spot is <strong>Gateway of India</strong>.</p>
</body>
</html>
