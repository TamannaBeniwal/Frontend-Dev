<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Catalog</title>
</head>
<body>

  <tr>
    <td><img src="product2.jpg" alt="Product 2" width="100"></td>
    <td>Smart Watch</td>
    <td>Tracks health and notifications.</td>
    <td>249</td>
    <td>Out of Stock</td>

  </tr>

</body>
</html>
