<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>
</head>
<body>
<h1>Contact Us</h1>

<form>
  <label>Full Name:<br>
    <input type="text" name="fullname" placeholder="Enter your full name" required>
  </label><br><br>

  <label>Email:<br>
    <input type="email" name="email" placeholder="Enter your email" required>
  </label><br><br>

  <label>Subject:<br>
    <input type="text" name="subject" placeholder="Subject" required>
  </label><br><br>

  <label>Message:<br>
    <textarea name="message" rows="5" cols="40" placeholder="Write your message..." required></textarea>
  </label><br><br>

  <input type="submit" value="Send Message">
</form>

</body>
</html>
