<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Form</title>
</head>
<body>
<h1>Feedback Form</h1>

<form method="post" action="#">
  <label>Your Feedback:</label><br>
  <textarea name="feedback" rows="5" cols="40" required></textarea><br><br>

  <label>Rate our service:</label><br>
  <label><input type="radio" name="rating" value="Good" required> Good</label>
  <label><input type="radio" name="rating" value="Average"> Average</label>
  <label><input type="radio" name="rating" value="Poor"> Poor</label><br><br>

  <input type="submit" value="Submit Feedback">
</form>

</body>
</html>
