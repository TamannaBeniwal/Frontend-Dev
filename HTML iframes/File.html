<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>File Upload Form</title>
</head>
<body>
<h1>Upload Your Image</h1>

<form>
  <label>Select File:
    <input type="file" name="file" accept=".jpg, .png" required>
  </label><br><br>
  <input type="submit" value="Upload">
</form>

<p>Only JPG and PNG image files are allowed.</p>

</body>
</html>
