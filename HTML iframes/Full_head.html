<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Sets document character encoding -->
  <meta charset="UTF-8">

  <!-- Provides a short description for search engines -->
  <meta name="description" content="Demonstration of important head elements in HTML.">

  <!-- Defines the document's author -->
  <meta name="author" content="Your Name">

  <!-- Defines the title shown in the browser tab -->
  <title>All Important Head Elements</title>

  <!-- Sets a base URL for relative links -->
  <base href="https://example.com/">

  <!-- Links to an external resource like favicon -->
  <link rel="icon" href="favicon.ico">

  <!-- Internal stylesheet (can be empty) -->
  <style>
    /* CSS styles go here */
  </style>

  <!-- JavaScript block (can be empty) -->
  <script>
    // JS code can go here
  </script>
</head>

<body>
<h1>HTML Head Elements Demonstration</h1>
<p>This page contains all essential elements inside the &lt;head&gt; section, with comments describing their purpose.</p>
</body>
</html>
