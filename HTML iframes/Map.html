<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Embedded Google Map</title>
</head>
<body>
<h1>My City Map</h1>

<!-- loading="lazy" defers loading of the iframe until it's needed -->
<iframe 
  src="https://www.google.com/maps?q=New+York&output=embed" 
  width="80%" 
  height="400" 
  title="Map of New York City"
  loading="lazy">
</iframe>

</body>
</html>
