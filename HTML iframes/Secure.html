<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Security</title>
</head>
<body>
<h1>Secure Form</h1>

<form autocomplete="off">
  <label>Username: <input type="text" name="username" required></label><br><br>
  <label>Password: <input type="password" name="password" required></label><br><br>
  <input type="submit" value="Login">
</form>

<p><em>Note:</em> Turning off autocomplete prevents browsers from saving sensitive form data like passwords, improving security on shared devices.</p>

</body>
</html>
