<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inline Formatting Example</title>
</head>
<body>
    <p>
        Learning web development is <strong>exciting</strong> and <em>challenging</em> at the same time.<br>
        You can highlight key terms using <mark>important tags</mark> and keep notes with 
        <small>practice every day!</small>.
    </p>
</body>
</html>
