<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Image Filter Gallery</title>
  <link rel="stylesheet" href="Image.css">
</head>
<body>
  <header>
    <h1>Image Filter Gallery</h1>
  </header>

  <main class="gallery">
    <figure>
      <img src="img1.jpg" alt="Mountain view" class="blur">
      <figcaption>Blur Filter</figcaption>
    </figure>
    <figure>
      <img src="img2.jpg" alt="Forest path" class="grayscale">
      <figcaption>Grayscale Filter</figcaption>
    </figure>
    <figure>
      <img src="img3.jpg" alt="Desert dunes" class="sepia">
      <figcaption>Sepia Filter</figcaption>
    </figure>
    <figure>
      <img src="img4.jpg" alt="Ocean wave" class="brightness">
      <figcaption>Brightness Filter</figcaption>
    </figure>
    <figure>
      <img src="img5.jpg" alt="City skyline" class="contrast">
      <figcaption>Contrast Filter</figcaption>
    </figure>
    <figure>
      <img src="img6.jpg" alt="Sunset sky" class="hue-rotate">
      <figcaption>Hue Rotate Filter</figcaption>
    </figure>
  </main>

  <footer>
    <p>Image Gallery</p>
  </footer>
</body>
</html>
