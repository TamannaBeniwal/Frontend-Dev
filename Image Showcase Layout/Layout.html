<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Showcase</title>
  <link rel="stylesheet" href="Layout.css">
</head>
<body>
  <main class="gallery">
    <figure>
      <img src="img1.jpg" alt="Nature">
      <figcaption>Beautiful Nature</figcaption>
    </figure>
    <figure>
      <img src="img2.jpg" alt="Mountains">
      <figcaption>Majestic Mountains</figcaption>
    </figure>
    <figure>
      <img src="img3.jpg" alt="Ocean">
      <figcaption>Peaceful Ocean</figcaption>
    </figure>
    <figure>
      <img src="img4.jpg" alt="Forest">
      <figcaption>Green Forest</figcaption>
    </figure>
    <figure>
      <img src="img5.jpg" alt="Desert">
      <figcaption>Golden Desert</figcaption>
    </figure>
    <figure>
      <img src="img6.jpg" alt="City">
      <figcaption>Vibrant City</figcaption>
    </figure>
  </main>
</body>
</html>
