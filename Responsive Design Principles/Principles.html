<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design Principles</title>
  <link rel="stylesheet" href="Principles.css">
</head>
<body>
  <main class="principles">
    <section class="box">
      <h2>Fluid Layouts</h2>
      <p>Use relative units like % and vw for flexible widths.</p>
      <code>width: 80%;</code>
    </section>
    <section class="box">
      <h2>Flexible Media</h2>
      <p>Make images responsive with max-width: 100%.</p>
      <code>img { max-width: 100%; }</code>
    </section>
    <section class="box">
      <h2>Breakpoints</h2>
      <p>Change layout using media queries.</p>
      <code>@media (max-width: 600px)</code>
    </section>
  </main>
</body>
</html>
