<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Offer Banner</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="offers.js" defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 25px;
        }

        .banner {
            padding: 20px;
            margin-bottom: 15px;
            background: #ffeeba;
            border: 2px solid orange;
            border-radius: 8px;
        }

        .controls button {
            margin-right: 10px;
            padding: 8px 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Special Offer Banners</h1>
</header>

<main>

    <section class="banners">
        <div class="banner" id="b1"> 50% OFF on Electronics!</div>
        <div class="banner" id="b2"> Buy 1 Get 1 Free – Clothing!</div>
        <div class="banner" id="b3"> Free Delivery on orders above ₹499!</div>
    </section>

    <section class="controls">
        <button id="hideBtn">Hide</button>
        <button id="showBtn">Show</button>
        <button id="slideBtn">Slide Up/Down</button>
        <button id="fadeBtn">Fade In/Out</button>
    </section>

</main>

</body>
</html>
