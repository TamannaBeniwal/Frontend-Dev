<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome Page Greeting</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>


    <script src="welcome.js" defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        header h1 {
            color: #444;
        }
        #greeting {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        #welcomeMsg {
            margin-top: 20px;
            padding: 15px;
            background: #f1f1f1;
            border-radius: 8px;
        }
        button {
            margin-right: 15px;
            margin-top: 20px;
            padding: 10px 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <h1>Welcome to Our Website</h1>
    </header>

    <main>
        <p id="greeting">Hello User!</p>

        <section id="welcomeMsg">
            <p>We hope you have a great experience on this website!</p>
        </section>

        <button id="changeGreetingBtn">Change Greeting</button>
        <button id="toggleMsgBtn">Toggle Welcome Message</button>
    </main>

    <footer>
        <p>© 2025 Web Demo | jQuery Practice</p>
    </footer>

</body>
</html>
